<!-- sps_dashboard/_partials/events_tab.html -->
{% load sps_tags %}

<div class="card">
    <div class="card-header">
        <h3 class="card-title">📜 Журнал событий</h3>

        <div style="display: flex; gap: 0.5rem; align-items: center;">
            <select
                hx-get="{% url 'sps_dashboard:line_events' line.pk %}?partial=1"
                hx-trigger="change"
                hx-target="#events-list"
                name="severity"
                style="padding: 0.5rem; border: 1px solid #e5e7eb; border-radius: 6px;">
                <option value="">Все уровни</option>
                <option value="info" {% if severity == 'info' %}selected{% endif %}>ℹ️ Информация</option>
                <option value="success" {% if severity == 'success' %}selected{% endif %}>🟢 Успех</option>
                <option value="warning" {% if severity == 'warning' %}selected{% endif %}>⚠️ Предупреждение</option>
                <option value="error" {% if severity == 'error' %}selected{% endif %}>🔴 Ошибка</option>
                <option value="critical" {% if severity == 'critical' %}selected{% endif %}>🚨 Критично</option>
            </select>

            <select
                hx-get="{% url 'sps_dashboard:line_events' line.pk %}?partial=1"
                hx-trigger="change"
                hx-target="#events-list"
                name="event_type"
                style="padding: 0.5rem; border: 1px solid #e5e7eb; border-radius: 6px;">
                <option value="">Все типы</option>
                <option value="status_change" {% if event_type == 'status_change' %}selected{% endif %}>🔄 Статус</option>
                <option value="sensor_alert" {% if event_type == 'sensor_alert' %}selected{% endif %}>📡 Датчики</option>
                <option value="maintenance" {% if event_type == 'maintenance' %}selected{% endif %}>🔧 Обслуживание</option>
                <option value="manual" {% if event_type == 'manual' %}selected{% endif %}>📝 Ручное</option>
            </select>

            <!-- Кнопка добавления события -->
            <button
                class="btn btn-primary"
                style="padding: 0.5rem 1rem;"
                onclick="document.getElementById('event-modal').style.display = 'flex'">
                ✏️ Добавить событие
            </button>
        </div>
    </div>

    <!-- Контейнер для списка -->
    <div id="events-list">
        {% include 'sps_dashboard/_partials/events_list.html' %}
    </div>
</div>

<!-- Модальное окно создания события -->
<div id="event-modal" style="
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
">
    <div class="card" style="
        width: 90%; max-width: 500px;
        margin: 0 auto;
        position: relative;
        max-height: 90vh;
        overflow-y: auto;
    ">
        <!-- Кнопка закрытия -->
        <button
            onclick="document.getElementById('event-modal').style.display = 'none'"
            style="
                position: absolute;
                top: 1rem; right: 1rem;
                background: none; border: none;
                font-size: 1.5rem; cursor: pointer;
                color: var(--gray);
            ">&times;</button>

        <div class="card-header" style="padding-right: 2rem;">
            <h3 class="card-title">✏️ Новое событие</h3>
        </div>

        <form method="post" action="{% url 'sps_dashboard:event_create' line.pk %}">
            {% csrf_token %}

            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <!-- Тип события -->
                <div>
                    <label style="display: block; margin-bottom: 0.25rem; font-weight: 500;">Тип события</label>
                    <select name="event_type" required style="width: 100%; padding: 0.75rem; border: 1px solid #e5e7eb; border-radius: 6px;">
                        <option value="">— Выберите тип —</option>
                        <option value="manual">📝 Ручная запись</option>
                        <option value="status_change">🔄 Изменение статуса</option>
                        <option value="sensor_alert">📡 Алерт датчика</option>
                        <option value="maintenance">🔧 Обслуживание</option>
                        <option value="part_replace">📦 Замена запчасти</option>
                    </select>
                </div>

                <!-- Важность -->
                <div>
                    <label style="display: block; margin-bottom: 0.25rem; font-weight: 500;">Важность</label>
                    <select name="severity" required style="width: 100%; padding: 0.75rem; border: 1px solid #e5e7eb; border-radius: 6px;">
                        <option value="info">ℹ️ Информация</option>
                        <option value="success">🟢 Успех</option>
                        <option value="warning">⚠️ Предупреждение</option>
                        <option value="error">🔴 Ошибка</option>
                        <option value="critical">🚨 Критично</option>
                    </select>
                </div>

                <!-- Заголовок -->
                <div>
                    <label style="display: block; margin-bottom: 0.25rem; font-weight: 500;">Заголовок *</label>
                    <input type="text" name="title" required maxlength="200" placeholder="Кратко о событии"
                        style="width: 100%; padding: 0.75rem; border: 1px solid #e5e7eb; border-radius: 6px;">
                </div>

                <!-- Сообщение -->
                <div>
                    <label style="display: block; margin-bottom: 0.25rem; font-weight: 500;">Описание</label>
                    <textarea name="message" rows="3" placeholder="Подробности (опционально)"
                        style="width: 100%; padding: 0.75rem; border: 1px solid #e5e7eb; border-radius: 6px; resize: vertical;"></textarea>
                </div>

                <!-- Узел (опционально) -->
                <div>
                    <label style="display: block; margin-bottom: 0.25rem; font-weight: 500;">Узел</label>
                    <select name="node" style="width: 100%; padding: 0.75rem; border: 1px solid #e5e7eb; border-radius: 6px;">
                        <option value="">— Не выбран —</option>
                        {% for node in line.nodes.all %}
                        <option value="{{ node.pk }}">{{ node.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Датчик (опционально) -->
                <div>
                    <label style="display: block; margin-bottom: 0.25rem; font-weight: 500;">Датчик</label>
                    <select name="sensor" style="width: 100%; padding: 0.75rem; border: 1px solid #e5e7eb; border-radius: 6px;">
                        <option value="">— Не выбран —</option>
                        {% for node in line.nodes.all %}
                            {% for sensor in node.sensors.all %}
                            <option value="{{ sensor.pk }}">{{ sensor.name }} ({{ node.name }})</option>
                            {% endfor %}
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Кнопки -->
            <div style="display: flex; gap: 0.5rem; margin-top: 1.5rem; justify-content: flex-end;">
                <button type="button" onclick="document.getElementById('event-modal').style.display = 'none'"
                    class="btn" style="background: #f3f4f6; color: #374151;">Отмена</button>
                <button type="submit" class="btn btn-primary">Создать событие</button>
            </div>
        </form>
    </div>
</div>

<script>
    document.getElementById('event-modal')?.addEventListener('click', function(e) {
        if (e.target === this) this.style.display = 'none';
    });
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') document.getElementById('event-modal')?.style.setProperty('display', 'none');
    });
</script>
