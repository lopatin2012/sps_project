{% extends 'base.html' %}

{% block title %}Вход в СПС{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 3rem auto;">
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">🔐 Вход в систему</h3>
        </div>

        <form method="post" style="display: flex; flex-direction: column; gap: 1rem;">
            {% csrf_token %}

            {% if form.errors %}
            <div class="alert alert-danger">
                Неверное имя пользователя или пароль
            </div>
            {% endif %}

            {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
            {% endif %}

            <div>
                <label for="id_username" style="display: block; margin-bottom: 0.25rem; font-weight: 500;">
                    Имя пользователя
                </label>
                <input
                    type="text"
                    name="username"
                    id="id_username"
                    required
                    autofocus
                    style="width: 100%; padding: 0.75rem; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 1rem;">
            </div>

            <div>
                <label for="id_password" style="display: block; margin-bottom: 0.25rem; font-weight: 500;">
                    Пароль
                </label>
                <input
                    type="password"
                    name="password"
                    id="id_password"
                    required
                    style="width: 100%; padding: 0.75rem; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 1rem;">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                Войти
            </button>
        </form>
    </div>

    <p style="text-align: center; color: var(--gray); margin-top: 1rem;">
        <small>Нет учётной записи? Обратитесь к администратору</small>
    </p>
</div>
{% endblock %}
